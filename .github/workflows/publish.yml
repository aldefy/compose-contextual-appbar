name: Publish
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Build signed staging
        run: ./gradlew :contextual-appbar:publishAllPublicationsToLocalStagingRepository -Psigning.gnupg.keyName=${{ secrets.GPG_KEY_ID }}
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
      - name: Create bundle zip
        run: cd contextual-appbar/build/staging-deploy && zip -r ../../../bundle.zip .
      - name: Upload to Maven Central
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -u "${{ secrets.OSSRH_USERNAME }}:${{ secrets.OSSRH_PASSWORD }}" \
            -F "bundle=@bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY (HTTP $HTTP_CODE)"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bundle.zip
          generate_release_notes: true
